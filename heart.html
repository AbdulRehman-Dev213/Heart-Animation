<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart</title>
    <style>
        html,
        body {

            height: 500px;
            width: 500px;
        }

        body {
            padding: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            height: 100px;
            width: 100px;
            background-color: red;
            transform: rotate(45deg);
            position: relative;
            transition: all 0.5s ease;
        }

        .container::before {
            content: "";
            height: 100%;
            width: 100%;
            background-color: red;
            position: absolute;
            transform: translate(-50%, 0);
            border-radius: 50%;
        }

        .container::after {
            content: "";
            height: 100%;
            width: 100%;
            background-color: red;
            position: absolute;
            transform: translate(0, -50%);
            border-radius: 50%;
        }

        .container:hover {
            transform: rotate(405deg) scale(2);
        }
    </style>
</head>

<body>
    <div class="container">

    </div>
</body>

</html>
